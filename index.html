<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uitjesbazen – WK 2026 Stand</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #060e1e; font-family: 'Inter', sans-serif; }
    #app {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px;
      color: #fff;
      min-height: 100vh;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .logo {
      background: #f97316;
      color: #fff;
      font-weight: 900;
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 6px;
      letter-spacing: 0.5px;
    }
    .title { font-size: 24px; font-weight: 700; }
    .subtitle { font-size: 13px; color: rgba(255,255,255,0.45); margin-top: 3px; }
    .header-right { text-align: right; }
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #ef4444;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 20px;
    }
    .live-dot {
      width: 7px; height: 7px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .last-update { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 6px; }

    .table-header {
      display: grid;
      grid-template-columns: 52px 1fr 90px 90px;
      gap: 8px;
      padding: 0 14px 10px;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .row {
      display: grid;
      grid-template-columns: 52px 1fr 90px 90px;
      gap: 8px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 4px;
      border: 1px solid transparent;
    }
    .row:nth-child(odd) { background: rgba(255,255,255,0.03); }
    .row.top3 { background: rgba(250,163,22,0.07); border-color: rgba(250,163,22,0.12); }
    .row.top1 { background: rgba(250,163,22,0.13); border-color: rgba(250,163,22,0.28); }

    .rank { font-size: 16px; font-weight: 700; color: rgba(255,255,255,0.35); text-align: center; }
    .rank.gold   { color: #f59e0b; }
    .rank.silver { color: #94a3b8; }
    .rank.bronze { color: #cd7c3a; }
    .name { font-size: 16px; font-weight: 500; }
    .points-round { font-size: 15px; color: rgba(255,255,255,0.4); text-align: center; }
    .points-total { font-size: 18px; font-weight: 700; color: #f59e0b; text-align: center; }

    .loading, .error {
      text-align: center;
      padding: 80px 20px;
      color: rgba(255,255,255,0.45);
      font-size: 15px;
      line-height: 1.8;
    }
    .error { color: #f87171; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    button {
      margin-top: 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    button:hover { background: rgba(255,255,255,0.13); }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="logo">WK 2026</div>
      <div>
        <div class="title">Uitjesbazen</div>
        <div class="subtitle">Poulestand</div>
      </div>
    </div>
    <div class="header-right">
      <div class="live-badge"><div class="live-dot"></div> Live</div>
      <div class="last-update" id="last-update"></div>
    </div>
  </div>
  <div id="content">
    <div class="loading"><div class="spinner"></div>Stand ophalen...</div>
  </div>
</div>

<script>
const API_PAGES = [
  'https://ranking.scorito.com/6/ranking/v2.0/gameranking/getpage/1135646/0/0',
  'https://ranking.scorito.com/6/ranking/v2.0/gameranking/getpage/1135646/0/1',
  'https://ranking.scorito.com/6/ranking/v2.0/gameranking/getpage/1135646/0/2',
];

async function fetchPage(url) {
  const res = await fetch(url, { credentials: 'include' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  return data.Content?.RankingItems || [];
}

async function loadStand() {
  try {
    const pages = await Promise.all(API_PAGES.map(fetchPage));
    const all = pages.flat().filter(p => p.UserName || p.Name);
    renderStand(all);
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="error">Kon de stand niet ophalen.<br>Zorg dat je ingelogd bent op <a href="https://scorito.com" target="_blank" style="color:#f59e0b">scorito.com</a> in dezelfde browser.<br><br><button onclick="loadStand()">Opnieuw proberen</button></div>';
  }
}

function renderStand(items) {
  if (!items.length) {
    document.getElementById('content').innerHTML =
      '<div class="error">Geen deelnemers gevonden.<br>Ben je ingelogd op scorito.com?<br><br><button onclick="loadStand()">Opnieuw proberen</button></div>';
    return;
  }

  const sorted = [...items].sort((a, b) => (b.TotalPoints || 0) - (a.TotalPoints || 0));

  let html = `<div class="table-header">
    <span style="text-align:center">#</span>
    <span>Naam</span>
    <span style="text-align:center">Ronde</span>
    <span style="text-align:center">Totaal</span>
  </div>`;

  sorted.forEach((p, i) => {
    const pos = i + 1;
    const rankClass = pos === 1 ? 'gold' : pos === 2 ? 'silver' : pos === 3 ? 'bronze' : '';
    const rowClass = pos === 1 ? 'row top1' : pos <= 3 ? 'row top3' : 'row';
    html += `<div class="${rowClass}">
      <div class="rank ${rankClass}">${pos}</div>
      <div class="name">${p.UserName || p.Name}</div>
      <div class="points-round">${p.RoundPoints ?? '-'}</div>
      <div class="points-total">${p.TotalPoints ?? 0}</div>
    </div>`;
  });

  document.getElementById('content').innerHTML = html;
  const now = new Date();
  document.getElementById('last-update').textContent =
    'Bijgewerkt om ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
}

loadStand();
setInterval(loadStand, 3 * 60 * 1000);
</script>
</body>
</html>
